# Manual curation — corrections and forum-only orders applied after fetch,
# before cleaning. Both sections are keyed by Username (case-insensitive) and
# flow through the normal cleaning (VIN recovery, date parsing, geo, etc.):
#
#   overrides:  edit one or more RAW fields on a person ALREADY in the orders
#               sheet. Use when someone posted more detail in the forum but did
#               not update the sheet. A username with no matching order is
#               reported as an issue.
#   additions:  append a forum-only order NOT in the sheet (a whole new row).
#               Give as many raw fields as you have. A username already in the
#               sheet is reported as an issue (use overrides for those instead).
#
# Version-controlled and auditable: every applied change/addition — and every
# problem (unknown field / no matching or already-present user) — shows in the
# cleaning report and the data-quality panel. Idempotent; never mutates the cache.
#
# Valid fields: orig_num, user, resv_raw, order_raw, vin_raw, delivery_raw,
# buylease, loc_raw, trim, launch, color, interior, wheels, autonomy, tow, spare,
# r1_owner, r1_keep, r1_model, other_vehicles.
#
# Example (commented out):
# overrides:
#   SomeUser:
#     vin_raw: "1234"            # forum-confirmed VIN, missing from the sheet
#     delivery_raw: "7/30/2026"  # posted a firm date after submitting
# additions:
#   ForumOnlyUser:
#     vin_raw: "1500"
#     delivery_raw: "8/1/2026"
#     loc_raw: "CA"
#     color: "Launch Green"

